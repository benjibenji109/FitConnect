<!DOCTYPE html>
<html lang="en">
<head>
    <title>FitConnect | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="topbar">
    <div class="container nav">

        <a class="brand" href="index.html">
            <span class="brand-mark">FitC</span>
            <span>FitConnect</span>
        </a>

        <nav class="nav-links">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="workouts.html">Workouts</a>
            <a class="nav-link" href="trainers.html">Trainers</a>
        </nav>

    </div>
</header>

<main class="container" style="max-width: 400px;">

    <h2>Create Account</h2>
    <p class="subtitle">Start your fitness journey today!</p>

    <label>Are you a Trainer or User</label>
    <select class="form-control">
        <option>User</option>
        <option>Trainer</option>
    </select>

    <form action="dashboard.html">

        <label style="margin-top: 10px;">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter name">

        <label style="margin-top: 10px;">Email</label>
        <input type="email" class="form-control" placeholder="Enter email">

        <label style="margin-top: 10px;">Password</label>
        <input type="password" class="form-control" placeholder="Create password">

        <label style="margin-top: 10px;">Confirm Password</label>
        <input type="password" class="form-control" placeholder="Confirm password">

        <button type="submit" class="button primary" style="margin-top: 15px; width: 100%;">
            Create Account
        </button>

    </form>

    <p class="subtitle" style="margin-top: 15px;">
        Already have an account? <a href="login.html">Login</a>
    </p>

</main>

</body>
</html>
