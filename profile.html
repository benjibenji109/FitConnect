<!DOCTYPE html>
<html lang="en">
<head>
    <title>FitConnect | Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="topbar">
    <div class="container nav">

        <a class="brand" href="index.html">
            <span class="brand-mark">FitC</span>
            <span>FitConnect</span>
        </a>

        <nav class="nav-links">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="workouts.html">Workouts</a>
            <a class="nav-link" href="trainers.html">Trainers</a>
            <a class="nav-link active" href="profile.html">Profile</a>
        </nav>

        <div class="profile-mini">
            <span class="avatar"></span>
            <strong>XXX</strong>
        </div>

    </div>
</header>

<main class="container">

    <h2>My Profile</h2>
    <p class="subtitle">Manage your account</p>

    <div class="panel" style="text-align: center;">
        <span class="avatar" style="width:60px; height:60px; display:block; margin:auto;"></span>
        <h3>XXX</h3>
        <p class="meta">XXX@email.com</p>
    </div>

    <div class="panel" style="margin-top: 20px;">
        <h3>Personal Information</h3>

        <div class="item-row">
            <span class="meta">Age</span>
            <strong>XXX</strong>
        </div>

        <div class="item-row">
            <span class="meta">Weight</span>
            <strong>XXXkg</strong>
        </div>

        <div class="item-row">
            <span class="meta">Height</span>
            <strong>XXXcm</strong>
        </div>

        <div class="item-row">
            <span class="meta">Goal</span>
            <strong>Weight loss</strong>
        </div>

    </div>

    <div class="panel" style="margin-top: 20px;">
        <h3>My current Trainer</h3>

        <div class="item-row">
            <div>
                <strong>XXX</strong>
                <div class="meta">Weight loss Training</div>
            </div>
        </div>

        <a href="trainers.html" class="button primary" style="margin-top: 10px;">
            View more Trainers
        </a>
    </div>

</main>

</body>
</html>
