<!DOCTYPE html>
<html lang="en">
<head>
    <title>FitConnect | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="topbar">
    <div class="container nav">

        <a class="brand" href="index.html">
            <span class="brand-mark">FitC</span>
            <span>FitConnect</span>
        </a>

        <nav class="nav-links">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="workouts.html">Workouts</a>
            <a class="nav-link" href="trainers.html">Trainers</a>
        </nav>

    </div>
</header>

<main class="container" style="max-width: 400px; text-align: center;">

    <h2>Login</h2>
    <p class="subtitle">Sign in to continue your fitness journey!</p>

    <form action="dashboard.html" style="text-align: left;">

        <label>Email</label>
        <input type="email" class="form-control" placeholder="Enter email/username">

        <label style="margin-top: 10px;">Password</label>
        <input type="password" class="form-control" placeholder="Enter password">

        <button type="submit" class="button primary" style="margin-top: 15px; width: 100%;">
            Login
        </button>

    </form>

    <p class="subtitle" style="margin-top: 15px;">Dont have account? <a href="register.html">Sign up</a>
    </p>

</main>
</body>
</html>
